<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Samikhsya 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:black;
  color:white;
  overflow:hidden;
  text-align:center;
}

/* SCREEN */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  transform:scale(1.1);
  transition:1s;
  pointer-events:none;
}
.active{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
}

/* BUTTON */
button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ff1493;
  color:white;
}

/* CAKE */
.cake{position:relative;width:220px;height:160px;}
.layer{position:absolute;width:100%;height:50px;border-radius:10px;}
.layer1{background:#ffb6c1;top:0;}
.layer2{background:#ff69b4;top:50px;}
.layer3{background:#ff1493;top:100px;}

.photo{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:80px;height:80px;border-radius:50%;
  border:3px solid white;
  background:url('https://i.imgur.com/ksWqIdY.png') center/cover;
}

/* CANDLES */
.candle{position:absolute;width:8px;height:25px;background:white;top:-25px;}
.flame{
  width:10px;height:10px;background:orange;border-radius:50%;
  animation:flicker .2s infinite alternate;
}
@keyframes flicker{
  from{transform:scale(1);}
  to{transform:scale(1.4);}
}

/* LETTER */
.letter{
  background:white;color:black;
  padding:20px;border-radius:15px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}
.gallery img,.gallery video{
  width:100%;
  border-radius:15px;
  opacity:0;
  transform:scale(0.8);
  transition:0.5s;
}
.gallery .show{
  opacity:1;
  transform:scale(1);
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="Perfect - 320Kbps-(Mr-Jat.in).mp3">
</audio>

<audio id="fireworkSound">
  <source src="freesound_community-fireworks-29629 (1).mp3">
</audio>

<audio id="blowSound">
  <source src="blow.mp3">
</audio>

<audio id="clickSound">
  <source src="click.mp3">
</audio>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <div class="card">
    <h1>For Samikhsya 💖</h1>
    <button onclick="next()">Start</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <div class="card">
    <h1>Happy 18th Birthday 🎉</h1>
    <button onclick="next()">Open Gift</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <div class="cake">
    <div class="layer layer1"></div>
    <div class="layer layer2"></div>
    <div class="layer layer3"></div>
    <div class="photo"></div>

    <div class="candle" style="left:40px"><div class="flame"></div></div>
    <div class="candle" style="left:100px"><div class="flame"></div></div>
    <div class="candle" style="left:160px"><div class="flame"></div></div>
  </div>
  <button onclick="blow()">Blow Candles 🕯️</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
  <div class="letter">
    💖 Samikhsya 💖<br><br>
    You are my world ❤️
  </div>
  <button onclick="next()">Memories 💖</button>
</div>

<!-- SCREEN 5 -->
<div class="screen" id="s5">
  <h2>💖 Our Memories 💖</h2>

  <div class="gallery">

    <!-- PHOTOS -->
    <img src="photo1.jpg">
    <img src="photo2.jpg">

    <!-- VIDEOS -->
    <video src="video1.mp4" muted playsinline></video>
    <video src="video2.mp4" muted playsinline></video>

    <img src="photo3.jpg">
    <video src="video3.mp4" muted playsinline></video>
    <img src="photo4.jpg">
    <img src="photo5.jpg">
    <video src="video4.mp4" muted playsinline></video>
    <img src="photo6.jpg">

  </div>
</div>

<script>
let step=1;

/* NAVIGATION */
function next(){
  document.getElementById("s"+step).classList.remove("active");
  step++;

  if(step===2){
    document.getElementById("music").play();
  }

  if(step<=5){
    document.getElementById("s"+step).classList.add("active");
  }

  if(step===5){
    showGallery();
  }
}

/* SOUND */
function play(id){
  let s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}

/* BLOW */
function blow(){
  play("blowSound");
  document.querySelectorAll(".flame").forEach(f=>f.style.display="none");
  next();
}

/* FIREWORK */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

function firework(){
  play("fireworkSound");

  for(let i=0;i<40;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height/2,
      vx:(Math.random()-0.5)*5,
      vy:(Math.random()-0.5)*5,
      life:100
    });
  }
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;

    ctx.fillStyle="white";
    ctx.fillRect(p.x,p.y,2,2);

    if(p.life<=0) particles.splice(i,1);
  });

  requestAnimationFrame(animate);
}

setInterval(firework,1200);
animate();

/* GALLERY */
function showGallery(){
  let items=document.querySelectorAll(".gallery img,.gallery video");

  items.forEach((el,i)=>{
    setTimeout(()=>{
      el.classList.add("show");

      if(el.tagName==="VIDEO"){
        el.play();
      }
    },i*400);
  });
}
</script>

</body>
</html>
